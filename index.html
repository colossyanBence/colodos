<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MS-DOS Terminal</title>
  <link href="https://fonts.cdnfonts.com/css/perfect-dos-vga-437" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    *:focus { outline: none; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Perfect DOS VGA 437', sans-serif;
    }
    #container {
      position: relative;
      padding: 40px 48px 52px 48px;
      background: linear-gradient(180deg, #d8ccbc 0%, #c4b8a8 15%, #b8a898 50%, #a89888 100%);
      border-radius: 16px;
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.3),
        inset 0 -2px 6px rgba(0,0,0,0.2),
        0 8px 24px rgba(0,0,0,0.5),
        0 0 0 1px rgba(0,0,0,0.15);
    }
    #glcanvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: 960px;
      height: 600px;
      border-radius: 6px;
      box-shadow:
        inset 0 0 0 2px #2a2a22,
        inset 0 2px 8px rgba(0,0,0,0.6),
        0 0 20px rgba(0,255,0,0.08);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="glcanvas" width="960" height="600"></canvas>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
